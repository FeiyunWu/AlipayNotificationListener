name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/
          yes | sdkmanager --licenses || true
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee gradle_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-output
          path: gradle_output.txt

      - uses: actions/upload-artifact@v4
        with:
          name: AlipayNotificationListener
          path: app/build/outputs/apk/debug/*.apk
